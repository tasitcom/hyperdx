version: '3.8'

services:
  db:
    image: mongo:5.0.32-focal
    volumes:
      - mongodb_data:/data/db
    networks:
      - internal
    deploy:
      restart_policy:
        condition: on-failure

  otel-collector:
    image: ${CH_IMAGE_REPO}/${NEXT_OTEL_COLLECTOR_IMAGE_NAME_DOCKERHUB}:${IMAGE_VERSION}
    environment:
      CLICKHOUSE_ENDPOINT: 'tcp://ch-server:9000?dial_timeout=10s'
      HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE: ${HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE}
      HYPERDX_LOG_LEVEL: ${HYPERDX_LOG_LEVEL}
      OPAMP_SERVER_URL: 'http://log-trace-hyperdx-5iuhz1_app:${HYPERDX_OPAMP_PORT}'
      HYPERDX_OTEL_EXPORTER_CREATE_LEGACY_SCHEMA: 'true'
      HYPERDX_API_KEY: ${HYPERDX_API_KEY}
    ports:
      - "13133:13133"
      - "24225:24225"
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    networks:
      - internal
    depends_on:
      - ch-server

  app:
    image: ${HDX_IMAGE_REPO}/${IMAGE_NAME_DOCKERHUB}:${IMAGE_VERSION}
    ports:
      - "${HYPERDX_API_PORT}:${HYPERDX_API_PORT}"
      - "${HYPERDX_APP_PORT}:${HYPERDX_APP_PORT}"
    environment:
      FRONTEND_URL: ${HYPERDX_APP_URL}:8080
      HYPERDX_API_KEY: ${HYPERDX_API_KEY}
      HYPERDX_API_PORT: "8000"
      HYPERDX_APP_PORT: "8080"
      HYPERDX_APP_URL: ${HYPERDX_APP_URL}
      HYPERDX_LOG_LEVEL: ${HYPERDX_LOG_LEVEL}
      MINER_API_URL: 'http://miner:5123'
      MONGO_URI: 'mongodb://db:27017/hyperdx'
      SERVER_URL: http://127.0.0.1:${HYPERDX_API_PORT}
      OPAMP_PORT: ${HYPERDX_OPAMP_PORT}
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://otel-collector:4318'
      OTEL_SERVICE_NAME: 'hdx-oss-app'
      USAGE_STATS_ENABLED: ${USAGE_STATS_ENABLED:-true}
      DEFAULT_CONNECTIONS: '[{"name":"Local ClickHouse","host":"http://ch-server:8123","username":"default","password":""}]'
      DEFAULT_SOURCES: '...' # (JSON verisini olduğu gibi koru)
      HYPERDX_API_KEY: ${HYPERDX_API_KEY}
    networks:
      - internal
    depends_on:
      - ch-server
      - db

  ch-server:
    image: clickhouse/clickhouse-server:26.1-alpine
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./docker/clickhouse/local/config.xml:/etc/clickhouse-server/config.xml
      - ./docker/clickhouse/local/users.xml:/etc/clickhouse-server/users.xml
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    networks:
      - internal

volumes:
  mongodb_data:
  clickhouse_data:
  clickhouse_logs:

networks:
  internal:
    external: true
    name: log-trace-hyperdx-5iuhz1_internal
